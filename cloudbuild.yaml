# Cloud Build pipeline: build → push → deploy.
# Run:  gcloud builds submit --config=cloudbuild.yaml
# Override any value: --substitutions=_PACKAGE_ID=0xNEW,_SUI_NETWORK=mainnet
#
# All NEXT_PUBLIC_* values are baked into the client bundle at build time
# (Next.js inlines them), so they MUST be present here, not just at runtime.

substitutions:
  _SERVICE: "cardjoybday"
  _REGION: "us-central1"
  _APP_URL: "https://cardjoybday.com"
  _SUI_NETWORK: "testnet"
  _SUI_RPC_URL: "https://fullnode.testnet.sui.io:443"
  _PACKAGE_ID: "0x01d4cb537283a740ddc9d9fa7c82a30baad22442dd41e109d8da0f2e0501a3d9"
  _TREASURY: "0xf64afb55d7f67645d7542ab066a43b17f309c53c4d083dab1af7629b5007f413"
  _FEE_MIST: "10000000"
  _WALRUS_PUB: "https://publisher.walrus-testnet.walrus.space"
  _WALRUS_AGG: "https://aggregator.walrus-testnet.walrus.space"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_APP_URL=${_APP_URL}
      - --build-arg=NEXT_PUBLIC_SUI_NETWORK=${_SUI_NETWORK}
      - --build-arg=NEXT_PUBLIC_SUI_RPC_URL=${_SUI_RPC_URL}
      - --build-arg=NEXT_PUBLIC_CARDJOY_PACKAGE_ID=${_PACKAGE_ID}
      - --build-arg=NEXT_PUBLIC_CARDJOY_TREASURY=${_TREASURY}
      - --build-arg=NEXT_PUBLIC_CARDJOY_FEE_MIST=${_FEE_MIST}
      - --build-arg=NEXT_PUBLIC_WALRUS_PUBLISHER_URL=${_WALRUS_PUB}
      - --build-arg=NEXT_PUBLIC_WALRUS_AGGREGATOR_URL=${_WALRUS_AGG}
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - --tag=gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=NEXT_PUBLIC_APP_URL=${_APP_URL},NEXT_PUBLIC_SUI_NETWORK=${_SUI_NETWORK},NEXT_PUBLIC_SUI_RPC_URL=${_SUI_RPC_URL},NEXT_PUBLIC_CARDJOY_PACKAGE_ID=${_PACKAGE_ID},NEXT_PUBLIC_CARDJOY_TREASURY=${_TREASURY},NEXT_PUBLIC_CARDJOY_FEE_MIST=${_FEE_MIST},NEXT_PUBLIC_WALRUS_PUBLISHER_URL=${_WALRUS_PUB},NEXT_PUBLIC_WALRUS_AGGREGATOR_URL=${_WALRUS_AGG}

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
